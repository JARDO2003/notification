<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FCM — Réception</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0e14;
      --surface: #131720;
      --border: #1e2535;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
    }

    .logo-ring {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: grid; place-items: center;
      box-shadow: 0 0 20px rgba(0,229,255,0.3);
      animation: pulse-ring 2.5s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 20px rgba(0,229,255,0.3); }
      50% { box-shadow: 0 0 35px rgba(0,229,255,0.6); }
    }

    .logo-ring svg { width: 24px; height: 24px; fill: var(--accent); }

    header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    header span { color: var(--accent); }

    .badge-live {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--success);
      border: 1px solid var(--success);
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
    }

    .dot-live {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* Token Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .token-box {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      word-break: break-all;
      line-height: 1.6;
      min-height: 56px;
      position: relative;
    }

    .token-placeholder {
      color: var(--muted);
      font-style: italic;
      display: flex; align-items: center; gap: 8px;
    }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .token-actions {
      display: flex; gap: 10px; margin-top: 12px;
    }

    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .btn-accent {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }

    .btn-accent:hover { background: #00c9e0; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    /* Status Banner */
    .status-banner {
      display: flex; align-items: center; gap: 12px;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.82rem;
      margin-top: 12px;
      border: 1px solid transparent;
      transition: all 0.3s;
    }

    .status-banner.idle { background: rgba(100,116,139,0.1); border-color: var(--border); color: var(--muted); }
    .status-banner.granted { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: var(--success); }
    .status-banner.denied { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: var(--error); }
    .status-banner.loading { background: rgba(0,229,255,0.05); border-color: rgba(0,229,255,0.2); color: var(--accent); }

    /* Notifications Feed */
    .feed-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }

    .feed-header h2 {
      font-size: 1rem; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
    }

    .count-badge {
      background: var(--accent2);
      color: #fff;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-family: 'Space Mono', monospace;
    }

    .btn-clear {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover { border-color: var(--error); color: var(--error); }

    #notif-feed {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .notif-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 0.85rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .notif-empty svg { opacity: 0.3; margin-bottom: 12px; }

    .notif-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 16px 18px;
      animation: slide-in 0.35s cubic-bezier(0.16,1,0.3,1) both;
      position: relative;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-16px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .notif-item.data { border-left-color: var(--accent2); }

    .notif-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px;
    }

    .notif-title {
      font-weight: 700;
      font-size: 0.92rem;
      margin-bottom: 4px;
    }

    .notif-body {
      font-size: 0.82rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .notif-time {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .notif-data {
      margin-top: 10px;
      background: #0d1117;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--accent2);
      overflow-x: auto;
    }

    .notif-tag {
      display: inline-block;
      font-size: 0.6rem;
      font-family: 'Space Mono', monospace;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .tag-notif { background: rgba(0,229,255,0.1); color: var(--accent); }
    .tag-data { background: rgba(124,58,237,0.15); color: var(--accent2); }
    .tag-fg { background: rgba(16,185,129,0.1); color: var(--success); }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-ring">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10.5 3.17 10.5 4v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    </div>
    <h1>FCM <span>Récepteur</span></h1>
    <div class="badge-live"><div class="dot-live"></div> Écoute</div>
  </header>

  <!-- Token Section -->
  <div class="card">
    <div class="card-label">// Jeton FCM de cet appareil</div>
    <div class="token-box" id="token-display">
      <span class="token-placeholder"><span class="spinner"></span> Initialisation…</span>
    </div>
    <div class="token-actions">
      <button class="btn btn-outline" id="btn-copy" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        Copier
      </button>
      <button class="btn btn-accent" id="btn-permission">
        Activer les notifications
      </button>
    </div>
    <div class="status-banner idle" id="status-banner">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="status-text">En attente d'autorisation…</span>
    </div>
  </div>

  <!-- Feed -->
  <div class="card">
    <div class="feed-header">
      <h2>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--accent)"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        Messages reçus
        <span class="count-badge" id="count-badge">0</span>
      </h2>
      <button class="btn-clear" id="btn-clear">Effacer</button>
    </div>
    <div id="notif-feed">
      <div class="notif-empty" id="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="var(--text)"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10.5 3.17 10.5 4v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <p>Aucune notification reçue</p>
        <p style="font-size:0.75rem;margin-top:6px;color:#475569">Les messages apparaîtront ici en temps réel</p>
      </div>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCPGgtXoDUycykLaTSee0S0yY0tkeJpqKI",
    authDomain: "data-com-a94a8.firebaseapp.com",
    databaseURL: "https://data-com-a94a8-default-rtdb.firebaseio.com",
    projectId: "data-com-a94a8",
    storageBucket: "data-com-a94a8.firebasestorage.app",
    messagingSenderId: "276904640935",
    appId: "1:276904640935:web:9cd805aeba6c34c767f682",
    measurementId: "G-FYQCWY5G4S"
  };

  const VAPID_KEY = "BLrbso554YWcAd7-QPbzRFMUpJ9obsdJitRiFtzr-VU4GArr8ariq1l9klHxFUjSzASpkoelaTDAzcvI7UIWLZ8";

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);

  let currentToken = null;
  let notifCount = 0;

  const tokenDisplay = document.getElementById('token-display');
  const btnCopy     = document.getElementById('btn-copy');
  const btnPerm     = document.getElementById('btn-permission');
  const banner      = document.getElementById('status-banner');
  const statusText  = document.getElementById('status-text');
  const feed        = document.getElementById('notif-feed');
  const emptyState  = document.getElementById('empty-state');
  const countBadge  = document.getElementById('count-badge');
  const btnClear    = document.getElementById('btn-clear');

  function setStatus(type, msg) {
    banner.className = `status-banner ${type}`;
    statusText.textContent = msg;
  }

  function formatTime(d) {
    return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function addNotif(payload, type = 'notification') {
    if (emptyState) emptyState.style.display = 'none';
    notifCount++;
    countBadge.textContent = notifCount;

    const item = document.createElement('div');
    item.className = `notif-item ${type === 'data' ? 'data' : ''}`;

    const { title, body } = payload.notification || {};
    const data = payload.data || {};

    const tagClass = type === 'data' ? 'tag-data' : 'tag-fg';
    const tagLabel = type === 'data' ? 'Data' : 'Foreground';

    item.innerHTML = `
      <span class="notif-tag ${tagClass}">${tagLabel}</span>
      <div class="notif-top">
        <div>
          <div class="notif-title">${title || '(Sans titre)'}</div>
          <div class="notif-body">${body || ''}</div>
        </div>
        <div class="notif-time">${formatTime(new Date())}</div>
      </div>
      ${Object.keys(data).length ? `<div class="notif-data">${JSON.stringify(data, null, 2)}</div>` : ''}
    `;

    feed.insertBefore(item, feed.firstChild);
  }

  async function registerSW() {
    if ('serviceWorker' in navigator) {
      try {
        await navigator.serviceWorker.register('/firebase-messaging-sw.js');
        console.log('[FCM] Service Worker enregistré');
      } catch (e) {
        console.warn('[FCM] SW non enregistré (localhost ok):', e);
      }
    }
  }

  async function requestAndGetToken() {
    btnPerm.disabled = true;
    setStatus('loading', 'Demande de permission en cours…');
    tokenDisplay.innerHTML = '<span class="token-placeholder"><span class="spinner"></span> Obtention du jeton…</span>';

    try {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        setStatus('denied', 'Permission refusée. Autorisez les notifications dans le navigateur.');
        tokenDisplay.innerHTML = '<span style="color:var(--error)">Permission refusée</span>';
        btnPerm.disabled = false;
        return;
      }

      await registerSW();

      currentToken = await getToken(messaging, { vapidKey: VAPID_KEY });
      if (currentToken) {
        tokenDisplay.textContent = currentToken;
        btnCopy.disabled = false;
        setStatus('granted', 'Notifications activées — en écoute des messages entrants');
        btnPerm.textContent = '✓ Activé';
        btnPerm.style.background = 'var(--success)';
        console.log('[FCM] Token:', currentToken);
      } else {
        setStatus('denied', 'Impossible d\'obtenir le jeton. Vérifiez la configuration Firebase.');
        btnPerm.disabled = false;
      }
    } catch (err) {
      setStatus('denied', `Erreur : ${err.message}`);
      tokenDisplay.innerHTML = `<span style="color:var(--error)">${err.message}</span>`;
      btnPerm.disabled = false;
    }
  }

  // Écoute des messages en premier plan
  onMessage(messaging, (payload) => {
    console.log('[FCM] Message foreground:', payload);
    addNotif(payload, 'foreground');

    // Afficher une notification native aussi (si permission ok)
    if (Notification.permission === 'granted' && payload.notification) {
      new Notification(payload.notification.title || 'Notification', {
        body: payload.notification.body || '',
        icon: payload.notification.icon || ''
      });
    }
  });

  // Copier le token
  btnCopy.addEventListener('click', async () => {
    if (!currentToken) return;
    await navigator.clipboard.writeText(currentToken);
    const orig = btnCopy.textContent;
    btnCopy.textContent = '✓ Copié !';
    btnCopy.style.borderColor = 'var(--success)';
    btnCopy.style.color = 'var(--success)';
    setTimeout(() => { btnCopy.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copier'; btnCopy.style.borderColor=''; btnCopy.style.color=''; }, 2000);
  });

  btnPerm.addEventListener('click', requestAndGetToken);

  // Effacer le feed
  btnClear.addEventListener('click', () => {
    notifCount = 0;
    countBadge.textContent = '0';
    feed.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'notif-empty';
    empty.id = 'empty-state';
    empty.innerHTML = `<svg width="40" height="40" viewBox="0 0 24 24" fill="var(--text)"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10.5 3.17 10.5 4v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg><p>Aucune notification reçue</p><p style="font-size:0.75rem;margin-top:6px;color:#475569">Les messages apparaîtront ici en temps réel</p>`;
    feed.appendChild(empty);
  });

  // Auto-init si déjà autorisé
  if (Notification.permission === 'granted') {
    requestAndGetToken();
  } else {
    tokenDisplay.innerHTML = '<span class="token-placeholder">Cliquez sur "Activer les notifications" pour obtenir votre jeton</span>';
    setStatus('idle', 'En attente de votre autorisation');
  }
</script>
</body>
</html>
