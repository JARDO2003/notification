<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Recevoir Notification</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      width: 300px;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    .btn-main {
      background: #22c55e;
      color: white;
    }

    .btn-main:hover {
      background: #16a34a;
    }

    .btn-send {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      margin-top: 20px;
    }

    .btn-send:hover {
      background: #2563eb;
    }

    #token {
      margin-top: 15px;
      font-size: 12px;
      word-break: break-all;
      color: #cbd5f5;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🔔 Notifications</h2>

  <button class="btn-main" onclick="init()">
    Activer Notifications
  </button>

  <!-- 🔥 Bouton bien visible -->
  <button class="btn-send" onclick="goToSend()">
    🚀 Envoyer une notification
  </button>

  <p id="token"></p>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js"></script>
<script src="app.js"></script>

<script>
function goToSend() {
  window.location.href = "send.html";
}
</script>

</body>
</html>
