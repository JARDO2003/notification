<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexus — Messagerie & Réseau</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090e;
  --s1:#0d1117;
  --s2:#141b26;
  --s3:#1c2535;
  --bd:#1f2d45;
  --bd2:#2e3f5c;
  --acc:#4f8ef7;
  --acc2:#7c3aed;
  --acc3:#06d6a0;
  --acc-glow:rgba(79,142,247,.22);
  --red:#ff4757;
  --orange:#ffa502;
  --txt:#e8edf5;
  --muted:#4a5568;
  --muted2:#6b7a99;
  --font:'Syne',sans-serif;
  --mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}

/* ── BG ── */
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(79,142,247,.07),transparent),
             radial-gradient(ellipse 60% 40% at 80% 110%,rgba(124,58,237,.07),transparent);
  pointer-events:none;z-index:0;}

/* ════════════ AUTH ════════════ */
#auth-screen{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.auth-box{
  width:420px;max-width:94vw;
  background:var(--s1);
  border:1px solid var(--bd);border-radius:20px;
  padding:36px 32px;
  box-shadow:0 40px 100px rgba(0,0,0,.6);
  animation:popIn .4s cubic-bezier(.22,1,.36,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:none}}
.auth-logo{
  display:flex;align-items:center;gap:10px;
  font-size:1.4rem;font-weight:800;letter-spacing:-.04em;
  margin-bottom:28px;
}
.auth-logo .gem{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:1rem;box-shadow:0 0 20px var(--acc-glow);
}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--s2);border-radius:10px;padding:4px;}
.auth-tab{
  flex:1;padding:9px;text-align:center;
  font-size:.82rem;font-weight:600;cursor:pointer;border-radius:7px;
  color:var(--muted2);transition:all .2s;border:none;background:none;font-family:var(--font);
}
.auth-tab.active{background:var(--acc);color:#fff;box-shadow:0 4px 14px var(--acc-glow);}

.a-field{margin-bottom:14px;}
.a-field label{display:block;font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;}
.a-field input{
  width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:9px;
  padding:11px 14px;color:var(--txt);font-family:var(--font);font-size:.85rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.a-field input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-glow);}
.a-field input::placeholder{color:var(--muted);opacity:.6;}

/* avatar upload */
.avatar-upload{
  display:flex;align-items:center;gap:14px;margin-bottom:14px;
  cursor:pointer;
}
.av-preview{
  width:52px;height:52px;border-radius:14px;
  background:var(--s2);border:2px dashed var(--bd2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;overflow:hidden;transition:border-color .2s;flex-shrink:0;
}
.av-preview:hover{border-color:var(--acc);}
.av-preview img{width:100%;height:100%;object-fit:cover;}
.av-label{font-size:.78rem;color:var(--muted2);}
.av-label strong{display:block;color:var(--txt);font-size:.85rem;margin-bottom:2px;}

.auth-btn{
  width:100%;padding:13px;margin-top:6px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  border:none;border-radius:10px;color:#fff;
  font-family:var(--font);font-weight:700;font-size:.9rem;
  cursor:pointer;transition:all .25s;letter-spacing:.04em;
}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(79,142,247,.4);}
.auth-err{font-size:.75rem;color:var(--red);margin-top:8px;text-align:center;min-height:18px;}

/* ════════════ APP SHELL ════════════ */
#app{display:none;height:100vh;flex-direction:column;}
#app.visible{display:flex;}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:58px;
  background:rgba(7,9,14,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
.top-logo{font-size:1.1rem;font-weight:800;letter-spacing:-.04em;display:flex;align-items:center;gap:8px;}
.top-logo .gem{width:28px;height:28px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.75rem;}
.top-nav{display:flex;gap:4px;}
.nav-btn{
  padding:7px 16px;border-radius:8px;border:none;background:none;
  color:var(--muted2);font-family:var(--font);font-weight:600;font-size:.8rem;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;position:relative;
}
.nav-btn:hover{background:var(--s2);color:var(--txt);}
.nav-btn.active{background:rgba(79,142,247,.15);color:var(--acc);}
.nav-badge{
  position:absolute;top:4px;right:8px;
  min-width:16px;height:16px;border-radius:8px;
  background:var(--red);color:#fff;font-size:.6rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
}
.top-user{display:flex;align-items:center;gap:10px;}
.u-avatar{width:34px;height:34px;border-radius:9px;object-fit:cover;background:var(--s2);border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0;overflow:hidden;}
.u-avatar img{width:100%;height:100%;object-fit:cover;}
.u-name{font-size:.8rem;font-weight:600;color:var(--txt);}
.logout-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--bd2);background:none;color:var(--muted2);font-family:var(--font);font-size:.72rem;cursor:pointer;transition:all .2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* ── VIEWS ── */
.view{display:none;flex:1;overflow:hidden;}
.view.active{display:flex;}

/* ── FEED VIEW ── */
#view-feed{flex-direction:column;overflow-y:auto;align-items:center;padding:24px 16px;}
.feed-wrap{width:100%;max-width:640px;}

.composer{
  background:var(--s1);border:1px solid var(--bd);border-radius:16px;
  padding:18px;margin-bottom:18px;
}
.composer-top{display:flex;gap:12px;align-items:flex-start;}
.composer textarea{
  flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:10px;
  padding:12px 14px;color:var(--txt);font-family:var(--font);font-size:.88rem;
  min-height:80px;resize:none;outline:none;transition:border-color .2s;
}
.composer textarea:focus{border-color:var(--acc);}
.composer textarea::placeholder{color:var(--muted);opacity:.6;}
.composer-actions{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.comp-img-preview{
  display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;
}
.comp-img-thumb{
  width:70px;height:70px;border-radius:8px;object-fit:cover;
  border:1px solid var(--bd);position:relative;cursor:pointer;
}
.comp-img-rm{
  position:absolute;top:-5px;right:-5px;width:18px;height:18px;
  background:var(--red);border-radius:50%;border:none;color:#fff;font-size:.65rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.btn-icon{
  padding:7px 12px;border-radius:8px;border:1px solid var(--bd2);background:none;
  color:var(--muted2);font-family:var(--font);font-size:.78rem;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:6px;
}
.btn-icon:hover{border-color:var(--acc);color:var(--acc);}
.btn-post{
  padding:9px 20px;border-radius:9px;border:none;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  color:#fff;font-family:var(--font);font-weight:700;font-size:.82rem;cursor:pointer;
  transition:all .2s;
}
.btn-post:hover{transform:translateY(-1px);box-shadow:0 6px 18px var(--acc-glow);}

/* Post card */
.post-card{
  background:var(--s1);border:1px solid var(--bd);border-radius:14px;
  padding:18px;margin-bottom:12px;transition:border-color .2s;animation:logIn .25s ease;
}
.post-card:hover{border-color:var(--bd2);}
.post-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.post-avatar{width:36px;height:36px;border-radius:9px;object-fit:cover;background:var(--s2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;overflow:hidden;flex-shrink:0;}
.post-avatar img{width:100%;height:100%;object-fit:cover;}
.post-meta{flex:1;}
.post-author{font-size:.85rem;font-weight:700;}
.post-time{font-size:.65rem;color:var(--muted2);font-family:var(--mono);}
.post-body{font-size:.88rem;line-height:1.7;color:var(--txt);margin-bottom:12px;white-space:pre-wrap;}
.post-images{display:grid;gap:6px;margin-bottom:12px;}
.post-images.n1{grid-template-columns:1fr;}
.post-images.n2{grid-template-columns:1fr 1fr;}
.post-images.n3{grid-template-columns:1fr 1fr 1fr;}
.post-images img{width:100%;height:180px;object-fit:cover;border-radius:9px;cursor:pointer;}
.post-actions{display:flex;gap:8px;border-top:1px solid var(--bd);padding-top:10px;}
.post-act-btn{
  padding:5px 12px;border-radius:7px;border:1px solid var(--bd);background:none;
  color:var(--muted2);font-family:var(--font);font-size:.75rem;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:5px;
}
.post-act-btn:hover{border-color:var(--acc);color:var(--acc);}
.post-act-btn.liked{border-color:var(--red);color:var(--red);}
.post-comments{margin-top:12px;display:none;}
.post-comments.open{display:block;}
.comment-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;max-height:200px;overflow-y:auto;}
.comment{display:flex;gap:8px;align-items:flex-start;}
.c-av{width:26px;height:26px;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;overflow:hidden;flex-shrink:0;}
.c-av img{width:100%;height:100%;object-fit:cover;}
.c-body{background:var(--s2);border-radius:8px;padding:7px 10px;font-size:.78rem;flex:1;}
.c-author{font-weight:700;font-size:.72rem;color:var(--acc);margin-bottom:2px;}
.comment-input-wrap{display:flex;gap:8px;}
.comment-input-wrap input{
  flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;
  padding:8px 12px;color:var(--txt);font-family:var(--font);font-size:.8rem;outline:none;
}
.comment-input-wrap input:focus{border-color:var(--acc);}
.comment-send{padding:8px 14px;border-radius:8px;border:none;background:var(--acc);color:#fff;font-family:var(--font);font-size:.78rem;cursor:pointer;}

/* ── CHAT VIEW ── */
#view-chat{flex-direction:row;}
.chat-sidebar{
  width:280px;flex-shrink:0;
  background:var(--s1);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
}
.sidebar-head{padding:16px;border-bottom:1px solid var(--bd);font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);}
.user-list{flex:1;overflow-y:auto;padding:8px;}
.user-list::-webkit-scrollbar{width:3px;}
.user-list::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
.user-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .18s;
  position:relative;
}
.user-item:hover{background:var(--s2);}
.user-item.active{background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.25);}
.ui-av{width:36px;height:36px;border-radius:9px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;overflow:hidden;flex-shrink:0;position:relative;}
.ui-av img{width:100%;height:100%;object-fit:cover;}
.online-dot{position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:var(--acc3);border:2px solid var(--s1);}
.ui-info{flex:1;min-width:0;}
.ui-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ui-last{font-size:.65rem;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.ui-badge{min-width:18px;height:18px;border-radius:9px;background:var(--red);color:#fff;font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0;}

.chat-main{flex:1;display:flex;flex-direction:column;background:var(--bg);}
.chat-header{
  padding:14px 20px;border-bottom:1px solid var(--bd);
  background:rgba(7,9,14,.9);backdrop-filter:blur(16px);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.chat-header-av{width:36px;height:36px;border-radius:9px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-weight:700;overflow:hidden;}
.chat-header-av img{width:100%;height:100%;object-fit:cover;}
.chat-header-info .name{font-size:.9rem;font-weight:700;}
.chat-header-info .status{font-size:.65rem;color:var(--acc3);font-family:var(--mono);}

.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;}
.chat-messages::-webkit-scrollbar{width:3px;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
.empty-chat{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:.85rem;gap:10px;}
.empty-chat .icon{font-size:2.5rem;opacity:.3;}

.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:75%;}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0;overflow:hidden;}
.msg-av img{width:100%;height:100%;object-fit:cover;}
.msg-bubble{
  background:var(--s2);border:1px solid var(--bd);border-radius:12px;
  padding:10px 14px;font-size:.85rem;line-height:1.6;position:relative;
  animation:logIn .2s ease;
}
.msg-row.me .msg-bubble{background:linear-gradient(135deg,rgba(79,142,247,.2),rgba(124,58,237,.2));border-color:rgba(79,142,247,.3);}
.msg-img{max-width:200px;border-radius:9px;margin-top:6px;cursor:pointer;}
.msg-time{font-size:.6rem;color:var(--muted);font-family:var(--mono);margin-top:4px;text-align:right;}

.chat-input-bar{
  padding:14px 20px;border-top:1px solid var(--bd);
  background:rgba(7,9,14,.9);backdrop-filter:blur(16px);
  display:flex;gap:10px;align-items:flex-end;flex-shrink:0;
}
.chat-input-bar textarea{
  flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:10px;
  padding:10px 14px;color:var(--txt);font-family:var(--font);font-size:.85rem;
  resize:none;outline:none;min-height:42px;max-height:120px;transition:border-color .2s;
}
.chat-input-bar textarea:focus{border-color:var(--acc);}
.send-img-btn,.send-msg-btn{
  padding:10px 14px;border-radius:9px;border:none;cursor:pointer;
  font-family:var(--font);font-size:.85rem;transition:all .2s;flex-shrink:0;
}
.send-img-btn{background:var(--s2);border:1px solid var(--bd2);color:var(--muted2);}
.send-img-btn:hover{border-color:var(--acc);color:var(--acc);}
.send-msg-btn{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:700;}
.send-msg-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px var(--acc-glow);}

/* chat image preview */
#chat-img-preview{display:flex;gap:8px;padding:0 20px 8px;flex-wrap:wrap;}
.chat-prev-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;border:1px solid var(--bd);cursor:pointer;}

/* ── NOTIFS VIEW ── */
#view-notifs{flex-direction:column;overflow-y:auto;align-items:center;padding:24px 16px;}
.notifs-wrap{width:100%;max-width:640px;}
.notif-card{
  background:var(--s1);border:1px solid var(--bd);border-radius:12px;
  padding:16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;
  transition:border-color .2s;animation:logIn .2s ease;cursor:pointer;
}
.notif-card:hover{border-color:var(--bd2);}
.notif-card.unread{border-color:rgba(79,142,247,.3);background:rgba(79,142,247,.04);}
.notif-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.notif-icon.msg{background:rgba(79,142,247,.15);}
.notif-icon.like{background:rgba(255,71,87,.15);}
.notif-icon.post{background:rgba(6,214,160,.15);}
.notif-body{flex:1;}
.notif-title{font-size:.85rem;font-weight:600;margin-bottom:3px;}
.notif-text{font-size:.78rem;color:var(--muted2);line-height:1.5;}
.notif-time{font-size:.65rem;color:var(--muted);font-family:var(--mono);}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--s2);border:1px solid var(--bd2);border-radius:12px;
  padding:12px 20px;font-size:.8rem;font-weight:500;z-index:9999;opacity:0;
  transition:all .35s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;gap:10px;
  white-space:nowrap;box-shadow:0 20px 60px rgba(0,0,0,.6);
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#toast.success{border-color:var(--acc3);color:var(--acc3);}
#toast.error{border-color:var(--red);color:var(--red);}
#toast.info{border-color:var(--acc);color:var(--acc);}

/* ── lightbox ── */
#lightbox{
  position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);
  display:none;align-items:center;justify-content:center;cursor:zoom-out;
}
#lightbox.open{display:flex;}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain;}

/* ── loading ── */
.spinner{
  width:18px;height:18px;border:2px solid var(--bd2);border-top-color:var(--acc);
  border-radius:50%;animation:spin .6s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes logIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── misc ── */
.section-title{font-size:.67rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--bd);}

/* ── no-conv placeholder ── */
.no-conv{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:12px;font-size:.85rem;}
.no-conv .icon{font-size:3rem;opacity:.2;}

/* ── responsive ── */
@media(max-width:680px){
  .chat-sidebar{width:220px;}
  .top-nav .nav-btn span{display:none;}
}
@media(max-width:480px){
  .chat-sidebar{display:none;}
  .topbar{padding:0 12px;}
}
</style>
</head>
<body>

<!-- ════════════ AUTH SCREEN ════════════ -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="gem">💬</div>
      Nexus
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Connexion</button>
      <button class="auth-tab" onclick="showTab('register')">Inscription</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div class="a-field">
        <label>Contact (téléphone / email)</label>
        <input type="text" id="l-contact" placeholder="06 12 34 56 78 ou email@..."/>
      </div>
      <div class="a-field">
        <label>Mot de passe</label>
        <input type="password" id="l-pass" placeholder="••••••••"/>
      </div>
      <button class="auth-btn" onclick="doLogin()">Se connecter →</button>
      <div class="auth-err" id="l-err"></div>
    </div>

    <!-- REGISTER -->
    <div id="tab-register" style="display:none">
      <div class="avatar-upload" onclick="document.getElementById('av-input').click()">

<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, set, onValue, get, serverTimestamp, query, orderByChild }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

/* ─── FIREBASE ─── */
const cfg = {
  apiKey:"AIzaSyCPGgtXoDUycykLaTSee0S0yY0tkeJpqKI",
  authDomain:"data-com-a94a8.firebaseapp.com",
  databaseURL:"https://data-com-a94a8-default-rtdb.firebaseio.com",
  projectId:"data-com-a94a8",
  storageBucket:"data-com-a94a8.firebasestorage.app",
  messagingSenderId:"276904640935",
  appId:"1:276904640935:web:9cd805aeba6c34c767f682",
};
const app = initializeApp(cfg);
const db  = getDatabase(app);

/* ─── CLOUDINARY ─── */
const CLD = { cloudName:'djxcqczh1', uploadPreset:'database' };
async function uploadToCloudinary(file){
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLD.uploadPreset);
  const r = await fetch(`https://api.cloudinary.com/v1_1/${CLD.cloudName}/image/upload`,{method:'POST',body:fd});
  const d = await r.json();
  return d.secure_url;
}

/* ─── STATE ─── */
let me = null;
let currentChatUser = null;
let postImages = [];
let chatImages = [];
let notifications = [];
let unreadMsg = 0, unreadNotif = 0;
let prevMsgCount = {};
let avatarFile = null;
let avatarPreviewUrl = null;
let lastMsgSoundTime = 0;

/* ─── SOUND ─── */
function playMsgSound(){
  const now = Date.now();
  if(now - lastMsgSoundTime < 1500) return;
  lastMsgSoundTime = now;
  const s = document.getElementById('msg-sound');
  s.currentTime = 0; s.play().catch(()=>{});
}
function playNotifSound(){
  const s = document.getElementById('notif-sound');
  s.currentTime = 0; s.play().catch(()=>{});
}

/* ─── TOAST ─── */
window.toast = function(m, t='info'){
  const el = document.getElementById('toast');
  const icons = {success:'✅',error:'❌',info:'ℹ️'};
  el.innerHTML = `<span>${icons[t]||'ℹ️'}</span><span>${m}</span>`;
  el.className = `show ${t}`;
  setTimeout(()=>el.className='',3500);
};

/* ─── AUTH TABS ─── */
window.showTab = function(tab){
  document.getElementById('tab-login').style.display = tab==='login'?'block':'none';
  document.getElementById('tab-register').style.display = tab==='register'?'block':'none';
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
};

/* ─── AVATAR PREVIEW ─── */
window.previewAvatar = function(input){
  if(!input.files[0]) return;
  avatarFile = input.files[0];
  const reader = new FileReader();
  reader.onload = e => {
    avatarPreviewUrl = e.target.result;
    const prev = document.getElementById('av-preview');
    prev.innerHTML = `<img src="${e.target.result}" alt=""/>`;
  };
  reader.readAsDataURL(avatarFile);
};

/* ─── REGISTER ─── */
window.doRegister = async function(){
  const prenom = document.getElementById('r-prenom').value.trim();
  const nom    = document.getElementById('r-nom').value.trim();
  const contact= document.getElementById('r-contact').value.trim();
  const pass   = document.getElementById('r-pass').value;
  const errEl  = document.getElementById('r-err');
  errEl.textContent='';

  if(!prenom||!nom){errEl.textContent='Prénom et nom requis.';return;}
  if(!contact){errEl.textContent='Contact requis.';return;}
  if(pass.length<6){errEl.textContent='Mot de passe trop court (min 6 car.)';return;}

  // check unique contact
  const snap = await get(ref(db,'users'));
  if(snap.exists()){
    const users = snap.val();
    for(const k in users){
      if(users[k].contact===contact){errEl.textContent='Ce contact est déjà utilisé.';return;}
    }
  }

  let avatarUrl = '';
  if(avatarFile){
    try{ avatarUrl = await uploadToCloudinary(avatarFile); }catch(e){ errEl.textContent='Erreur upload photo.';return; }
  }

  const userRef = push(ref(db,'users'));
  await set(userRef,{
    id:userRef.key,
    prenom, nom,
    name:`${prenom} ${nom}`,
    contact,
    pass,
    avatar: avatarUrl,
    createdAt: Date.now(),
    online: true,
  });
  toast('Compte créé ! Bienvenue 🎉','success');
  showTab('login');
  document.getElementById('l-contact').value = contact;
};

/* ─── LOGIN ─── */
window.doLogin = async function(){
  const contact = document.getElementById('l-contact').value.trim();
  const pass    = document.getElementById('l-pass').value;
  const errEl   = document.getElementById('l-err');
  errEl.textContent='';

  if(!contact||!pass){errEl.textContent='Tous les champs sont requis.';return;}
  const snap = await get(ref(db,'users'));
  if(!snap.exists()){errEl.textContent='Aucun compte trouvé.';return;}
  const users = snap.val();
  let found = null;
  for(const k in users){
    if(users[k].contact===contact && users[k].pass===pass){ found=users[k]; break; }
  }
  if(!found){errEl.textContent='Contact ou mot de passe incorrect.';return;}
  me = found;
  set(ref(db,`users/${me.id}/online`), true);
  launchApp();
};

/* ─── LOGOUT ─── */
window.doLogout = function(){
  if(me) set(ref(db,`users/${me.id}/online`), false);
  me = null; currentChatUser = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-screen').style.display='flex';
};

/* ─── LAUNCH APP ─── */
function launchApp(){
  document.getElementById('auth-screen').style.display='none';
  const appEl = document.getElementById('app');
  appEl.classList.add('visible');

  // top bar avatar
  const topAv = document.getElementById('top-avatar');
  if(me.avatar) topAv.innerHTML=`<img src="${me.avatar}" alt=""/>`;
  else topAv.textContent = initials(me.name);
  document.getElementById('top-name').textContent = me.prenom;

  // composer avatar
  const compAv = document.getElementById('comp-avatar');
  if(me.avatar) compAv.innerHTML=`<img src="${me.avatar}" alt=""/>`;
  else compAv.textContent = initials(me.name);

  loadFeed();
  loadUsers();
  listenAllMessages();
}

/* ─── HELPERS ─── */
function initials(name='?'){
  return name.split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('')||'?';
}
function relTime(ts){
  const d=Math.floor((Date.now()-ts)/1000);
  if(d<60)return`${d}s`;if(d<3600)return`${Math.floor(d/60)}min`;
  if(d<86400)return`${Math.floor(d/3600)}h`;return`${Math.floor(d/86400)}j`;
}
function avatarEl(user, size=34){
  if(user?.avatar) return `<img src="${user.avatar}" alt="" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:9px;"/>`;
  return initials(user?.name||'?');
}

/* ─── VIEWS ─── */
window.switchView = function(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  document.getElementById(`nav-${v}`).classList.add('active');
  if(v==='notifs'){
    unreadNotif=0;
    document.getElementById('notif-badge').style.display='none';
  }
  if(v==='chat' && currentChatUser){
    setTimeout(scrollMsgs,100);
  }
};

/* ════════════ FEED ════════════ */
let postImgUrls = [];

window.handlePostImages = function(input){
  postImages = [...input.files];
  const prev = document.getElementById('comp-img-preview');
  prev.innerHTML='';
  postImages.forEach((f,i)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const wrap=document.createElement('div');wrap.style.position='relative';wrap.style.display='inline-block';
      const img=document.createElement('img');img.src=e.target.result;img.className='comp-img-thumb';
      const rm=document.createElement('button');rm.className='comp-img-rm';rm.textContent='×';
      rm.onclick=()=>{postImages.splice(i,1);handlePostImages({files:postImages});};
      wrap.appendChild(img);wrap.appendChild(rm);prev.appendChild(wrap);
    };
    reader.readAsDataURL(f);
  });
};

window.submitPost = async function(){
  const text = document.getElementById('post-text').value.trim();
  if(!text && postImages.length===0){toast('Écrivez quelque chose !','error');return;}
  const btn = document.querySelector('.btn-post');
  btn.textContent='⏳';btn.disabled=true;

  let imgUrls=[];
  for(const f of postImages){
    try{ imgUrls.push(await uploadToCloudinary(f)); }catch(e){}
  }

  const postRef = push(ref(db,'posts'));
  await set(postRef,{
    id:postRef.key,
    uid: me.id,
    authorName: me.name,
    authorAvatar: me.avatar||'',
    text,
    images: imgUrls,
    likes: {},
    createdAt: Date.now(),
  });

  document.getElementById('post-text').value='';
  postImages=[];
  document.getElementById('comp-img-preview').innerHTML='';
  document.getElementById('post-img-input').value='';
  btn.textContent='Publier';btn.disabled=false;
  toast('Publié !','success');

  // notify all users
  const snap = await get(ref(db,'users'));
  if(snap.exists()){
    const users=snap.val();
    for(const k in users){
      if(k===me.id) continue;
      push(ref(db,`notifications/${k}`),{
        type:'post', from:me.name, text:`${me.prenom} a publié un nouveau post`,
        postId:postRef.key, read:false, createdAt:Date.now()
      });
    }
  }
};

function loadFeed(){
  const list=document.getElementById('feed-list');
  onValue(query(ref(db,'posts'),orderByChild('createdAt')),(snap)=>{
    list.innerHTML='';
    if(!snap.exists()){list.innerHTML='<div style="text-align:center;color:var(--muted);padding:40px;font-size:.85rem;">Aucune publication pour l\'instant.</div>';return;}
    const posts=[];
    snap.forEach(child=>posts.push(child.val()));
    posts.sort((a,b)=>b.createdAt-a.createdAt);
    posts.forEach(p=>list.appendChild(buildPostCard(p)));
  });
}

function buildPostCard(p){
  const div=document.createElement('div');
  div.className='post-card';div.id=`post-${p.id}`;
  const liked = p.likes && p.likes[me?.id];
  const likeCount=Object.keys(p.likes||{}).length;
  const commentCount=Object.keys(p.comments||{}).length;
  const imgs=p.images||[];
  const nc=Math.min(imgs.length,3);
  const imgsHtml=imgs.length?`<div class="post-images n${nc}">${imgs.map(u=>`<img src="${u}" onclick="openLightbox('${u}')" alt=""/>`).join('')}</div>`:'';
  div.innerHTML=`
    <div class="post-head">
      <div class="post-avatar" style="border:2px solid var(--bd2)">${p.authorAvatar?`<img src="${p.authorAvatar}" alt=""/>`:initials(p.authorName)}</div>
      <div class="post-meta">
        <div class="post-author">${p.authorName}</div>
        <div class="post-time">${relTime(p.createdAt)} · il y a</div>
      </div>
    </div>
    ${p.text?`<div class="post-body">${escHtml(p.text)}</div>`:''}
    ${imgsHtml}
    <div class="post-actions">
      <button class="post-act-btn ${liked?'liked':''}" id="like-btn-${p.id}" onclick="toggleLike('${p.id}')">
        ${liked?'❤️':'🤍'} ${likeCount||''}
      </button>
      <button class="post-act-btn" onclick="toggleComments('${p.id}')">💬 ${commentCount||''}</button>
    </div>
    <div class="post-comments" id="comments-${p.id}">
      <div class="comment-list" id="clist-${p.id}"></div>
      <div class="comment-input-wrap">
        <input placeholder="Ajouter un commentaire…" id="cinput-${p.id}" onkeydown="if(event.key==='Enter'){addComment('${p.id}');event.preventDefault()}"/>
        <button class="comment-send" onclick="addComment('${p.id}')">↑</button>
      </div>
    </div>`;
  // load comments live
  onValue(ref(db,`posts/${p.id}/comments`),(snap)=>{
    const cl=document.getElementById(`clist-${p.id}`);if(!cl)return;
    cl.innerHTML='';
    if(snap.exists()) snap.forEach(c=>{
      const cv=c.val();
      cl.innerHTML+=`<div class="comment">
        <div class="c-av">${cv.avatar?`<img src="${cv.avatar}" alt=""/>`:initials(cv.authorName)}</div>
        <div class="c-body"><div class="c-author">${cv.authorName}</div>${escHtml(cv.text)}</div>
      </div>`;
    });
  });
  return div;
}

window.toggleLike = function(pid){
  const likeRef=ref(db,`posts/${pid}/likes/${me.id}`);
  get(likeRef).then(s=>{
    if(s.exists()) set(likeRef,null);
    else {
      set(likeRef,true);
      // notify post author
      get(ref(db,`posts/${pid}`)).then(ps=>{
        const pv=ps.val();
        if(pv&&pv.uid!==me.id){
          push(ref(db,`notifications/${pv.uid}`),{
            type:'like',from:me.name,text:`${me.prenom} a aimé votre publication`,
            postId:pid,read:false,createdAt:Date.now()
          });
          playNotifSound();
        }
      });
    }
  });
};

window.toggleComments = function(pid){
  const el=document.getElementById(`comments-${pid}`);
  el.classList.toggle('open');
  if(el.classList.contains('open')){
    const inp=document.getElementById(`cinput-${pid}`);if(inp)inp.focus();
  }
};

window.addComment = function(pid){
  const inp=document.getElementById(`cinput-${pid}`);
  const text=inp.value.trim();if(!text)return;
  push(ref(db,`posts/${pid}/comments`),{
    authorName:me.name, avatar:me.avatar||'', text, createdAt:Date.now()
  });
  inp.value='';
  // notify
  get(ref(db,`posts/${pid}`)).then(ps=>{
    const pv=ps.val();
    if(pv&&pv.uid!==me.id){
      push(ref(db,`notifications/${pv.uid}`),{
        type:'post',from:me.name,text:`${me.prenom} a commenté votre publication`,
        postId:pid,read:false,createdAt:Date.now()
      });
      playNotifSound();
    }
  });
};

/* ════════════ CHAT ════════════ */
let chatImgUrls=[];

function loadUsers(){
  onValue(ref(db,'users'),(snap)=>{
    const list=document.getElementById('user-list');list.innerHTML='';
    if(!snap.exists())return;
    snap.forEach(child=>{
      const u=child.val();if(u.id===me.id)return;
      const div=document.createElement('div');
      div.className='user-item'+(currentChatUser?.id===u.id?' active':'');
      div.dataset.uid=u.id;
      const badge=prevMsgCount[u.id]?`<div class="ui-badge">${prevMsgCount[u.id]}</div>`:'';
      div.innerHTML=`
        <div class="ui-av" style="position:relative;">
          ${u.avatar?`<img src="${u.avatar}" alt=""/>`:initials(u.name)}
          ${u.online?'<div class="online-dot"></div>':''}
        </div>
        <div class="ui-info">
          <div class="ui-name">${u.name}</div>
          <div class="ui-last">${u.online?'En ligne':'Hors ligne'}</div>
        </div>
        ${badge}`;
      div.onclick=()=>openChat(u);
      list.appendChild(div);
    });
  });
}

function openChat(user){
  currentChatUser=user;
  document.querySelectorAll('.user-item').forEach(el=>el.classList.toggle('active',el.dataset.uid===user.id));
  document.getElementById('no-conv-placeholder').style.display='none';
  const panel=document.getElementById('conv-panel');panel.style.display='flex';

  const chAv=document.getElementById('ch-av');
  if(user.avatar) chAv.innerHTML=`<img src="${user.avatar}" alt="" style="width:36px;height:36px;object-fit:cover;border-radius:9px;"/>`;
  else chAv.textContent=initials(user.name);
  document.getElementById('ch-name').textContent=user.name;
  document.getElementById('ch-status').textContent=user.online?'En ligne':'Hors ligne';

  // clear badge
  prevMsgCount[user.id]=0;
  loadChatMessages(user.id);
}

function convKey(a,b){ return [a,b].sort().join('_'); }

function loadChatMessages(uid){
  const key=convKey(me.id,uid);
  const msgs=document.getElementById('chat-messages');
  msgs.innerHTML='';
  onValue(query(ref(db,`messages/${key}`),orderByChild('createdAt')),(snap)=>{
    msgs.innerHTML='';
    if(!snap.exists()){msgs.innerHTML='<div class="empty-chat"><div class="icon">✉️</div>Commencez la conversation !</div>';return;}
    snap.forEach(child=>{
      const m=child.val();
      msgs.appendChild(buildMsgBubble(m));
    });
    scrollMsgs();
  });
}

function buildMsgBubble(m){
  const isMe=m.uid===me.id;
  const senderAv = isMe ? me.avatar : currentChatUser?.avatar;
  const senderName = isMe ? me.name : currentChatUser?.name;
  const row=document.createElement('div');
  row.className=`msg-row${isMe?' me':''}`;
  const avHtml=senderAv?`<img src="${senderAv}" alt="" style="width:28px;height:28px;object-fit:cover;border-radius:7px;"/>`:`<span style="font-size:.65rem;font-weight:700;">${initials(senderName)}</span>`;
  const imgsHtml=(m.images||[]).map(u=>`<img src="${u}" class="msg-img" onclick="openLightbox('${u}')" alt=""/>`).join('');
  row.innerHTML=`
    <div class="msg-av">${avHtml}</div>
    <div>
      <div class="msg-bubble">
        ${m.text?`<span>${escHtml(m.text)}</span>`:''}
        ${imgsHtml}
        <div class="msg-time">${relTime(m.createdAt)}</div>
      </div>
    </div>`;
  return row;
}

function scrollMsgs(){
  const msgs=document.getElementById('chat-messages');
  msgs.scrollTop=msgs.scrollHeight;
}

window.handleChatImages = function(input){
  chatImages=[...input.files];
  const prev=document.getElementById('chat-img-preview');
  prev.innerHTML='';
  chatImages.forEach(f=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=document.createElement('img');
      img.src=e.target.result;img.className='chat-prev-thumb';
      img.onclick=()=>{chatImages=[];prev.innerHTML='';};
      prev.appendChild(img);
    };
    reader.readAsDataURL(f);
  });
};

window.sendMessage = async function(){
  if(!currentChatUser){toast('Sélectionnez un utilisateur','error');return;}
  const ta=document.getElementById('chat-msg');
  const text=ta.value.trim();
  if(!text&&chatImages.length===0) return;

  const btn=document.querySelector('.send-msg-btn');
  btn.textContent='⏳';btn.disabled=true;

  let imgUrls=[];
  for(const f of chatImages){
    try{ imgUrls.push(await uploadToCloudinary(f)); }catch(e){}
  }

  const key=convKey(me.id,currentChatUser.id);
  const msgRef=push(ref(db,`messages/${key}`));
  await set(msgRef,{
    id:msgRef.key,
    uid:me.id,
    senderName:me.name,
    text,
    images:imgUrls,
    createdAt:Date.now(),
  });

  // notification to recipient
  push(ref(db,`notifications/${currentChatUser.id}`),{
    type:'msg',from:me.name,text:text||'📷 Image',
    read:false,createdAt:Date.now()
  });

  ta.value='';ta.style.height='auto';
  chatImages=[];document.getElementById('chat-img-preview').innerHTML='';
  document.getElementById('chat-img-input').value='';
  btn.textContent='↑';btn.disabled=false;
};

/* ── Listen ALL messages for badge & sound ── */
function listenAllMessages(){
  // For each pair involving me, we watch counts
  onValue(ref(db,'messages'),(snap)=>{
    if(!snap.exists()||!me) return;
    let newTotal=0;
    snap.forEach(conv=>{
      if(!conv.key.includes(me.id)) return;
      const otherUid=conv.key.replace(me.id,'').replace('_','');
      if(otherUid===currentChatUser?.id) return;// already in view
      let count=0;
      conv.forEach(msg=>{
        const m=msg.val();
        if(m.uid!==me.id) count++;
      });
      const prev=prevMsgCount[otherUid]||0;
      if(count>prev){
        const diff=count-prev;newTotal+=diff;
        if(diff>0) playMsgSound();
      }
      prevMsgCount[otherUid]=count;
    });
    if(newTotal>0){
      unreadMsg+=newTotal;
      const badge=document.getElementById('msg-badge');
      badge.style.display='flex';badge.textContent=unreadMsg>99?'99+':unreadMsg;
    }
  });

  // Notifications
  if(me){
    onValue(ref(db,`notifications/${me.id}`),(snap)=>{
      const list=document.getElementById('notif-list');
      list.innerHTML='';unreadNotif=0;
      if(!snap.exists()){list.innerHTML='<div style="text-align:center;color:var(--muted);padding:40px;font-size:.85rem;">Aucune notification pour l\'instant.</div>';return;}
      const notifs=[];
      snap.forEach(c=>notifs.push({key:c.key,...c.val()}));
      notifs.sort((a,b)=>b.createdAt-a.createdAt);
      notifs.forEach(n=>{
        if(!n.read) unreadNotif++;
        const ic={msg:'💬',like:'❤️',post:'🔔'}[n.type]||'🔔';
        const icClass={msg:'msg',like:'like',post:'post'}[n.type]||'post';
        const div=document.createElement('div');
        div.className=`notif-card${n.read?'':' unread'}`;
        div.innerHTML=`
          <div class="notif-icon ${icClass}">${ic}</div>
          <div class="notif-body">
            <div class="notif-title">${n.from}</div>
            <div class="notif-text">${n.text}</div>
            <div class="notif-time">${relTime(n.createdAt)}</div>
          </div>`;
        div.onclick=()=>set(ref(db,`notifications/${me.id}/${n.key}/read`),true);
        list.appendChild(div);
      });
      const badge=document.getElementById('notif-badge');
      if(unreadNotif>0){badge.style.display='flex';badge.textContent=unreadNotif>99?'99+':unreadNotif;}
      else badge.style.display='none';
    });
  }

  // Reset msg badge when entering chat view
  document.getElementById('nav-chat').addEventListener('click',()=>{
    unreadMsg=0;
    document.getElementById('msg-badge').style.display='none';
  });
}

/* ─── Lightbox ─── */
window.openLightbox = function(url){
  document.getElementById('lb-img').src=url;
  document.getElementById('lightbox').classList.add('open');
};
window.closeLightbox = function(){
  document.getElementById('lightbox').classList.remove('open');
};

/* ─── Utils ─── */
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
