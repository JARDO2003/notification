<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCM — Envoi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c10; --surface: #0e1318; --surface2: #151c24;
    --border: #1e2d3d; --accent: #ff6b35; --accent2: #ff1744;
    --blue: #00e5ff; --green: #00e676; --purple: #7c4dff;
    --text: #e8f4f8; --muted: #5a7a8a;
  }
  body { font-family:'DM Mono',monospace; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(255,107,53,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,53,0.025) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  body::after { content:''; position:fixed; top:-200px; left:-200px; width:600px; height:600px; background:radial-gradient(circle,rgba(255,107,53,0.1),transparent 70%); pointer-events:none; z-index:0; }

  header { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:20px 32px; border-bottom:1px solid var(--border); background:rgba(8,12,16,0.9); backdrop-filter:blur(12px); }
  .logo { display:flex; align-items:center; gap:12px; font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; letter-spacing:0.05em; color:var(--accent); }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent); }
  .nav-link { font-size:0.78rem; color:var(--muted); text-decoration:none; letter-spacing:0.1em; transition:color 0.2s; }
  .nav-link:hover,.nav-link.active { color:var(--accent); }

  main { position:relative; z-index:10; flex:1; display:grid; grid-template-columns:1fr 380px; gap:24px; padding:32px; max-width:1200px; margin:0 auto; width:100%; }

  .panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .panel-header { padding:16px 20px; border-bottom:1px solid var(--border); font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:700; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; display:flex; align-items:center; gap:8px; }
  .panel-body { padding:24px; }

  /* Destinataires */
  .recipients-section { margin-bottom:22px; }
  .section-label { font-size:0.68rem; color:var(--muted); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }

  .recipients-grid { display:flex; flex-direction:column; gap:8px; }

  .recipient-item {
    display:flex; align-items:center; gap:12px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:12px 14px;
    cursor:pointer; transition:all 0.2s;
    user-select:none;
  }
  .recipient-item:hover { border-color:rgba(255,107,53,0.4); }
  .recipient-item.selected { border-color:var(--accent); background:rgba(255,107,53,0.07); }
  .recipient-item.selected .ri-check { opacity:1; }

  .ri-avatar {
    width:34px; height:34px; border-radius:8px;
    background:linear-gradient(135deg,var(--purple),var(--blue));
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-weight:800; font-size:0.8rem;
    color:#fff; flex-shrink:0;
  }
  .ri-info { flex:1; min-width:0; }
  .ri-name { font-size:0.82rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ri-time { font-size:0.62rem; color:var(--muted); margin-top:2px; }
  .ri-check {
    width:18px; height:18px; border-radius:50%;
    background:var(--accent); border:none;
    display:flex; align-items:center; justify-content:center;
    font-size:0.65rem; color:#fff; opacity:0;
    transition:opacity 0.2s; flex-shrink:0;
  }

  .select-all-btn {
    background:transparent; border:1px solid var(--border);
    color:var(--muted); border-radius:6px; padding:4px 10px;
    font-family:'DM Mono',monospace; font-size:0.65rem;
    cursor:pointer; transition:all 0.2s;
  }
  .select-all-btn:hover { border-color:var(--accent); color:var(--accent); }

  .empty-recipients {
    text-align:center; padding:32px 20px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; color:var(--muted); font-size:0.75rem; line-height:1.7;
  }
  .empty-recipients a { color:var(--blue); text-decoration:none; }

  .refresh-btn {
    background:transparent; border:1px solid var(--border);
    color:var(--muted); border-radius:6px; padding:4px 10px;
    font-family:'DM Mono',monospace; font-size:0.65rem;
    cursor:pointer; transition:all 0.2s;
  }
  .refresh-btn:hover { border-color:var(--blue); color:var(--blue); }
  .refresh-btn.spin { animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Form */
  .form-group { margin-bottom:18px; }
  label { display:block; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  input[type=text], textarea {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:11px 14px; color:var(--text);
    font-family:'DM Mono',monospace; font-size:0.8rem; outline:none;
    transition:border-color 0.2s,box-shadow 0.2s;
  }
  input:focus, textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,107,53,0.1); }
  textarea { resize:vertical; min-height:80px; }
  input::placeholder,textarea::placeholder { color:var(--muted); opacity:0.5; }

  .send-btn {
    width:100%; padding:14px;
    background:linear-gradient(135deg,var(--accent2),var(--accent));
    border:none; border-radius:8px; color:#fff;
    font-family:'Syne',sans-serif; font-weight:800; font-size:0.85rem;
    letter-spacing:0.12em; cursor:pointer; transition:all 0.25s; text-transform:uppercase;
    position:relative; overflow:hidden;
  }
  .send-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent); transform:translateX(-100%); transition:transform 0.5s; }
  .send-btn:hover:not(:disabled)::before { transform:translateX(100%); }
  .send-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 20px rgba(255,107,53,0.35); }
  .send-btn:disabled { opacity:0.4; cursor:not-allowed; }

  /* Logs panel */
  .logs-panel { display:flex; flex-direction:column; }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; padding:14px 16px; border-bottom:1px solid var(--border); }
  .stat-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px; text-align:center; }
  .stat-val { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem; }
  .stat-val.s { color:var(--accent); } .stat-val.ok { color:var(--green); } .stat-val.f { color:var(--accent2); }
  .stat-label { font-size:0.62rem; color:var(--muted); margin-top:4px; letter-spacing:0.1em; }

  #log-feed { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:7px; max-height:500px; }
  #log-feed::-webkit-scrollbar { width:4px; }
  #log-feed::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .log-entry { font-size:0.72rem; line-height:1.5; padding:9px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; animation:fadeIn 0.25s ease; }
  @keyframes fadeIn { from{opacity:0}to{opacity:1} }
  .log-entry.success { border-left:3px solid var(--green); color:var(--green); }
  .log-entry.error   { border-left:3px solid var(--accent2); color:var(--accent2); }
  .log-entry.info    { border-left:3px solid var(--blue); color:var(--blue); }
  .log-entry.pending { border-left:3px solid var(--accent); color:var(--accent); }
  .log-time { opacity:0.6; margin-right:8px; }

  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px 24px; font-size:0.78rem; z-index:1000; opacity:0; transition:all 0.35s cubic-bezier(0.22,1,0.36,1); display:flex; align-items:center; gap:10px; white-space:nowrap; }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  #toast.success { border-color:var(--green); color:var(--green); }
  #toast.error   { border-color:var(--accent2); color:var(--accent2); }
  #toast.info    { border-color:var(--blue); color:var(--blue); }
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div>FCM SENDER</div>
  <div style="display:flex;gap:24px">
    <a href="send.html" class="nav-link active">ENVOYER</a>
    <a href="receive.html" class="nav-link">→ RECEVOIR</a>
  </div>
</header>

<main>
  <!-- Formulaire -->
  <div class="panel">
    <div class="panel-header">✉ COMPOSER</div>
    <div class="panel-body">

      <!-- Destinataires depuis DB -->
      <div class="recipients-section">
        <div class="section-label">
          <span>DESTINATAIRES <span id="rec-count" style="color:var(--accent)"></span></span>
          <div style="display:flex;gap:8px">
            <button class="select-all-btn" onclick="selectAll()">TOUT SÉLECTIONNER</button>
            <button class="refresh-btn" id="refresh-btn" onclick="loadRecipients()">↻ ACTUALISER</button>
          </div>
        </div>
        <div class="recipients-grid" id="recipients-grid">
          <div class="empty-recipients">
            Chargement des destinataires…
          </div>
        </div>
      </div>

      <!-- Message -->
      <div class="form-group">
        <label>TITRE</label>
        <input type="text" id="notif-title" placeholder="Titre de la notification"/>
      </div>
      <div class="form-group">
        <label>MESSAGE</label>
        <textarea id="notif-body" rows="3" placeholder="Contenu de la notification…"></textarea>
      </div>

      <button class="send-btn" id="send-btn" onclick="sendNotification()">
        🚀 ENVOYER
      </button>
    </div>
  </div>

  <!-- Logs -->
  <div class="panel logs-panel">
    <div class="panel-header">📊 LOGS</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val s" id="s-sent">0</div><div class="stat-label">ENVOYÉS</div></div>
      <div class="stat-card"><div class="stat-val ok" id="s-ok">0</div><div class="stat-label">SUCCÈS</div></div>
      <div class="stat-card"><div class="stat-val f" id="s-fail">0</div><div class="stat-label">ÉCHECS</div></div>
    </div>
    <div id="log-feed">
      <div class="log-entry info"><span class="log-time">--:--:--</span>Prêt — chargement des destinataires…</div>
    </div>
  </div>
</main>
<div id="toast"></div>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const cfg = {
  apiKey:"AIzaSyCPGgtXoDUycykLaTSee0S0yY0tkeJpqKI",
  authDomain:"data-com-a94a8.firebaseapp.com",
  databaseURL:"https://data-com-a94a8-default-rtdb.firebaseio.com",
  projectId:"data-com-a94a8",
  storageBucket:"data-com-a94a8.firebasestorage.app",
  messagingSenderId:"276904640935",
  appId:"1:276904640935:web:9cd805aeba6c34c767f682",
};

const app = initializeApp(cfg);
const db  = getDatabase(app);

let allRecipients = {}; // { key: { token, name, updatedAt } }
let selected = new Set();
let sentTotal=0, okTotal=0, failTotal=0;

// ── Temps relatif ────────────────────────────────────────────────────────────
function relativeTime(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60)  return `il y a ${diff}s`;
  if (diff < 3600) return `il y a ${Math.floor(diff/60)}min`;
  return `il y a ${Math.floor(diff/3600)}h`;
}

function initials(name) {
  return name.split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('') || '?';
}

// ── Chargement destinataires (temps réel) ────────────────────────────────────
window.loadRecipients = function() {
  const rbtn = document.getElementById('refresh-btn');
  rbtn.classList.add('spin');

  onValue(ref(db, 'fcm_tokens'), (snapshot) => {
    rbtn.classList.remove('spin');
    allRecipients = snapshot.val() || {};
    renderRecipients();
    log(`${Object.keys(allRecipients).length} destinataire(s) chargé(s)`, 'info');
  }, { onlyOnce: false }); // écoute en temps réel
};

function renderRecipients() {
  const grid = document.getElementById('recipients-grid');
  const keys = Object.keys(allRecipients);

  document.getElementById('rec-count').textContent = keys.length ? `(${keys.length})` : '';

  if (!keys.length) {
    grid.innerHTML = `<div class="empty-recipients">
      Aucun destinataire enregistré.<br/>
      Ouvrez <a href="receive.html">receive.html</a> et activez les notifications.
    </div>`;
    return;
  }

  // Trier par date (plus récent en haut)
  keys.sort((a,b) => (allRecipients[b].updatedAt||0) - (allRecipients[a].updatedAt||0));

  grid.innerHTML = '';
  keys.forEach(key => {
    const r = allRecipients[key];
    const isSelected = selected.has(key);
    const div = document.createElement('div');
    div.className = `recipient-item${isSelected?' selected':''}`;
    div.dataset.key = key;
    div.innerHTML = `
      <div class="ri-avatar">${initials(r.name||'?')}</div>
      <div class="ri-info">
        <div class="ri-name">${r.name || 'Anonyme'}</div>
        <div class="ri-time">${r.updatedAt ? relativeTime(r.updatedAt) : ''}</div>
      </div>
      <div class="ri-check">✓</div>
    `;
    div.onclick = () => toggleSelect(key, div);
    grid.appendChild(div);
  });
}

function toggleSelect(key, el) {
  if (selected.has(key)) { selected.delete(key); el.classList.remove('selected'); }
  else { selected.add(key); el.classList.add('selected'); }
}

window.selectAll = function() {
  const allKeys = Object.keys(allRecipients);
  const grid    = document.getElementById('recipients-grid');
  if (selected.size === allKeys.length) {
    // Tout désélectionner
    selected.clear();
    grid.querySelectorAll('.recipient-item').forEach(el => el.classList.remove('selected'));
  } else {
    // Tout sélectionner
    allKeys.forEach(k => selected.add(k));
    grid.querySelectorAll('.recipient-item').forEach(el => el.classList.add('selected'));
  }
};

// ── Logs ──────────────────────────────────────────────────────────────────────
window.log = function(msg, type='info') {
  const feed = document.getElementById('log-feed');
  const el   = document.createElement('div');
  el.className = `log-entry ${type}`;
  el.innerHTML = `<span class="log-time">${new Date().toLocaleTimeString('fr-FR')}</span>${msg}`;
  feed.insertBefore(el, feed.firstChild);
};

function toast(m, t='info') {
  const el = document.getElementById('toast');
  el.innerHTML = `<span>${{success:'✅',error:'❌',info:'ℹ️'}[t]}</span><span>${m}</span>`;
  el.className = `show ${t}`; setTimeout(()=>el.className='',3500);
}

// ── Envoi ─────────────────────────────────────────────────────────────────────
window.sendNotification = async function() {
  const title = document.getElementById('notif-title').value.trim();
  const body  = document.getElementById('notif-body').value.trim();
  const btn   = document.getElementById('send-btn');

  if (!title || !body) { toast('Titre et message requis','error'); return; }
  if (!selected.size)  { toast('Sélectionnez au moins un destinataire','error'); return; }

  const tokens = [...selected].map(k => allRecipients[k]?.token).filter(Boolean);
  if (!tokens.length) { toast('Tokens introuvables','error'); return; }

  btn.disabled = true; btn.textContent = '⏳ ENVOI…';
  log(`Envoi à ${tokens.length} destinataire(s) : "${title}"`, 'pending');

  try {
    const res  = await fetch('/api/send', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ tokens, title, body }),
    });
    const json = await res.json();

    if (json.success) {
      sentTotal += tokens.length; okTotal += json.successCount; failTotal += json.failureCount;
      document.getElementById('s-sent').textContent = sentTotal;
      document.getElementById('s-ok').textContent   = okTotal;
      document.getElementById('s-fail').textContent = failTotal;
      log(`✅ ${json.successCount} succès / ${json.failureCount} échec(s)`, 'success');
      toast(`Envoyé à ${json.successCount} destinataire(s) !`, 'success');
    } else {
      log(`❌ Erreur : ${json.error}`, 'error');
      toast('Erreur : ' + json.error, 'error');
    }
  } catch(e) {
    log(`❌ Erreur réseau : ${e.message}`, 'error');
    toast('Erreur réseau', 'error');
  } finally {
    btn.disabled = false; btn.textContent = '🚀 ENVOYER';
  }
};

// ── Init ──────────────────────────────────────────────────────────────────────
loadRecipients();
</script>
</body>
</html>
