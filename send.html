<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCM — Envoi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c10;
    --surface: #0e1318;
    --surface2: #151c24;
    --border: #1e2d3d;
    --accent: #ff6b35;
    --accent2: #ff1744;
    --blue: #00e5ff;
    --green: #00e676;
    --text: #e8f4f8;
    --muted: #5a7a8a;
    --glow: rgba(255, 107, 53, 0.12);
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,107,53,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,53,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,107,53,0.1), transparent 70%);
    pointer-events: none; z-index: 0;
  }

  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,12,16,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
    letter-spacing: 0.05em; color: var(--accent);
  }

  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent), 0 0 24px var(--accent);
  }

  .nav-link {
    font-size: 0.78rem; color: var(--muted);
    text-decoration: none; letter-spacing: 0.1em;
    transition: color 0.2s;
  }
  .nav-link:hover { color: var(--accent); }
  .nav-link.active { color: var(--accent); }

  main {
    position: relative; z-index: 10;
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 24px;
    padding: 32px;
    max-width: 1200px; margin: 0 auto; width: 100%;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.15em; color: var(--muted);
    text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }

  .panel-body { padding: 24px; }

  /* FORM */
  .form-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 0.68rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 8px;
  }

  input, textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
  }

  textarea { resize: vertical; min-height: 80px; }

  input::placeholder, textarea::placeholder { color: var(--muted); opacity: 0.6; }

  /* MODE TABS */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 4px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1; padding: 9px;
    background: transparent; border: none; border-radius: 6px;
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.08em;
    cursor: pointer; transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(255,107,53,0.3);
  }

  /* DATA FIELDS */
  .data-row {
    display: grid; grid-template-columns: 1fr 1fr auto;
    gap: 8px; margin-bottom: 8px;
  }

  .remove-row {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 6px;
    width: 38px; cursor: pointer; font-size: 1rem;
    transition: all 0.2s;
  }
  .remove-row:hover { border-color: var(--accent2); color: var(--accent2); }

  .add-data-btn {
    background: transparent; border: 1px dashed var(--border);
    color: var(--muted); border-radius: 6px;
    padding: 9px; width: 100%;
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    cursor: pointer; transition: all 0.2s;
  }
  .add-data-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* SERVER CONFIG */
  .server-row {
    display: flex; gap: 8px;
  }
  .server-row input { flex: 1; }
  .server-row button {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px;
    padding: 12px 16px; font-family: 'DM Mono', monospace;
    font-size: 0.72rem; cursor: pointer; transition: all 0.2s;
    white-space: nowrap;
  }
  .server-row button:hover { border-color: var(--blue); color: var(--blue); }
  .server-row button.ok { border-color: var(--green); color: var(--green); }

  /* SEND BUTTON */
  .send-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 8px;
    color: #fff;
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 0.85rem; letter-spacing: 0.12em;
    cursor: pointer; transition: all 0.25s;
    text-transform: uppercase;
    position: relative; overflow: hidden;
  }
  .send-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .send-btn:hover::before { transform: translateX(100%); }
  .send-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,107,53,0.35); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .send-btn.loading { opacity: 0.7; }

  /* === PANNEAU DROITE : LOGS === */
  .logs-panel {
    display: flex; flex-direction: column;
  }

  #log-feed {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
    min-height: 300px; max-height: 600px;
  }
  #log-feed::-webkit-scrollbar { width: 4px; }
  #log-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-entry {
    font-size: 0.72rem; line-height: 1.5;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .log-entry.success { border-left: 3px solid var(--green); color: var(--green); }
  .log-entry.error   { border-left: 3px solid var(--accent2); color: var(--accent2); }
  .log-entry.info    { border-left: 3px solid var(--blue); color: var(--blue); }
  .log-entry.pending { border-left: 3px solid var(--accent); color: var(--accent); }

  .log-time { opacity: 0.6; margin-right: 8px; }

  /* STATS CARDS */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .stat-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
    text-align: center;
  }
  .stat-val {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 1.5rem;
  }
  .stat-val.sent   { color: var(--accent); }
  .stat-val.ok     { color: var(--green); }
  .stat-val.fail   { color: var(--accent2); }
  .stat-label { font-size: 0.62rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.1em; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 24px;
    font-size: 0.78rem; z-index: 1000;
    opacity: 0; transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex; align-items: center; gap: 10px;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error   { border-color: var(--accent2); color: var(--accent2); }
  #toast.info    { border-color: var(--blue); color: var(--blue); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    FCM SENDER
  </div>
  <div style="display:flex;gap:24px">
    <a href="send.html" class="nav-link active">ENVOYER</a>
    <a href="receive.html" class="nav-link">→ RECEVOIR</a>
  </div>
</header>

<main>
  <!-- Formulaire d'envoi -->
  <div class="panel">
    <div class="panel-header">✉ COMPOSER UNE NOTIFICATION</div>
    <div class="panel-body">

      <!-- Mode -->
      <div class="tabs">
        <button class="tab active" onclick="setMode('single',this)">TOKEN UNIQUE</button>
        <button class="tab" onclick="setMode('multi',this)">MULTICAST</button>
        <button class="tab" onclick="setMode('topic',this)">TOPIC</button>
      </div>

      <!-- Token(s) -->
      <div class="form-group" id="token-group">
        <label>TOKEN FCM DESTINATAIRE</label>
        <textarea id="tokens-input" rows="3" placeholder="Collez le token FCM (depuis receive.html)"></textarea>
      </div>

      <div class="form-group" id="topic-group" style="display:none">
        <label>NOM DU TOPIC</label>
        <input type="text" id="topic-input" placeholder="ex: news, alerts, promo"/>
      </div>

      <!-- Notification -->
      <div class="form-group">
        <label>TITRE</label>
        <input type="text" id="notif-title" placeholder="Titre de la notification"/>
      </div>

      <div class="form-group">
        <label>CORPS DU MESSAGE</label>
        <textarea id="notif-body" rows="3" placeholder="Contenu de la notification…"></textarea>
      </div>

      <!-- Data payload -->
      <div class="form-group">
        <label>DONNÉES ADDITIONNELLES (optionnel)</label>
        <div id="data-rows"></div>
        <button class="add-data-btn" onclick="addDataRow()">+ AJOUTER UN CHAMP</button>
      </div>

      <!-- Serveur -->
      <div class="form-group">
        <label>URL DU SERVEUR BACKEND</label>
        <div class="server-row">
          <input type="text" id="server-url" value="http://localhost:3000" placeholder="http://localhost:3000"/>
          <button id="ping-btn" onclick="pingServer()">PING</button>
        </div>
      </div>

      <button class="send-btn" id="send-btn" onclick="sendNotification()">
        🚀 ENVOYER LA NOTIFICATION
      </button>
    </div>
  </div>

  <!-- Logs & Stats -->
  <div class="panel logs-panel">
    <div class="panel-header">📊 LOGS D'ENVOI</div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val sent" id="s-sent">0</div>
        <div class="stat-label">ENVOYÉS</div>
      </div>
      <div class="stat-card">
        <div class="stat-val ok" id="s-ok">0</div>
        <div class="stat-label">SUCCÈS</div>
      </div>
      <div class="stat-card">
        <div class="stat-val fail" id="s-fail">0</div>
        <div class="stat-label">ÉCHECS</div>
      </div>
    </div>

    <div id="log-feed">
      <div class="log-entry info">
        <span class="log-time">--:--:--</span>
        Prêt — configurez le serveur et envoyez votre première notification.
      </div>
    </div>

    <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end">
      <button class="add-data-btn" style="width:auto;padding:8px 16px" onclick="clearLogs()">EFFACER LES LOGS</button>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
let mode = 'single';
let sent = 0, ok = 0, fail = 0;

// ── MODE ──────────────────────────────────────────────────────────────────
function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  document.getElementById('token-group').style.display = m !== 'topic' ? '' : 'none';
  document.getElementById('topic-group').style.display = m === 'topic' ? '' : 'none';

  if (m === 'multi') {
    document.getElementById('tokens-input').placeholder =
      'Collez les tokens FCM — un par ligne';
  } else {
    document.getElementById('tokens-input').placeholder =
      'Collez le token FCM (depuis receive.html)';
  }
}

// ── DATA ROWS ─────────────────────────────────────────────────────────────
function addDataRow() {
  const container = document.getElementById('data-rows');
  const row = document.createElement('div');
  row.className = 'data-row';
  row.innerHTML = `
    <input type="text" placeholder="clé" class="data-key"/>
    <input type="text" placeholder="valeur" class="data-val"/>
    <button class="remove-row" onclick="this.parentElement.remove()">×</button>
  `;
  container.appendChild(row);
}

function getDataPayload() {
  const data = {};
  document.querySelectorAll('.data-row').forEach(row => {
    const k = row.querySelector('.data-key').value.trim();
    const v = row.querySelector('.data-val').value.trim();
    if (k) data[k] = v;
  });
  return data;
}

// ── LOGS ──────────────────────────────────────────────────────────────────
function log(msg, type = 'info') {
  const feed = document.getElementById('log-feed');
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  const now = new Date().toLocaleTimeString('fr-FR');
  entry.innerHTML = `<span class="log-time">${now}</span>${msg}`;
  feed.insertBefore(entry, feed.firstChild);
}

function clearLogs() {
  document.getElementById('log-feed').innerHTML = '';
  log('Logs effacés.', 'info');
}

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  t.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3500);
}

function updateStats(s, o, f) {
  sent += s; ok += o; fail += f;
  document.getElementById('s-sent').textContent = sent;
  document.getElementById('s-ok').textContent   = ok;
  document.getElementById('s-fail').textContent = fail;
}

// ── PING ──────────────────────────────────────────────────────────────────
async function pingServer() {
  const url  = document.getElementById('server-url').value.trim();
  const btn  = document.getElementById('ping-btn');
  btn.textContent = '…';
  try {
    const res = await fetch(url.replace(/\/$/, '') + '/ping', { method: 'GET', signal: AbortSignal.timeout(3000) });
    if (res.ok || res.status === 404) {
      btn.textContent = '✓ OK';
      btn.classList.add('ok');
      log(`Serveur accessible : ${url}`, 'success');
    } else {
      throw new Error('HTTP ' + res.status);
    }
  } catch {
    btn.textContent = '✗ HORS LIGNE';
    log(`Serveur inaccessible : ${url} — assurez-vous que server.js est démarré (node server.js)`, 'error');
  }
  setTimeout(() => { btn.textContent = 'PING'; btn.classList.remove('ok'); }, 3000);
}

// ── SEND ─────────────────────────────────────────────────────────────────
async function sendNotification() {
  const serverUrl = document.getElementById('server-url').value.trim().replace(/\/$/, '');
  const title     = document.getElementById('notif-title').value.trim();
  const body      = document.getElementById('notif-body').value.trim();
  const data      = getDataPayload();
  const btn       = document.getElementById('send-btn');

  if (!title || !body) {
    showToast('Renseignez le titre et le corps du message', 'error');
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '⏳ ENVOI EN COURS…';

  try {
    if (mode === 'single') {
      const token = document.getElementById('tokens-input').value.trim();
      if (!token) { showToast('Token FCM requis', 'error'); return; }

      log(`Envoi → token: ${token.slice(0,30)}…`, 'pending');
      updateStats(1, 0, 0);

      const res  = await fetch(`${serverUrl}/send-notification`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, title, body, data }),
      });
      const json = await res.json();

      if (json.success) {
        log(`✅ Succès — ID: ${json.messageId}`, 'success');
        updateStats(0, 1, 0);
        showToast('Notification envoyée !', 'success');
      } else {
        log(`❌ Erreur FCM: ${json.error}`, 'error');
        updateStats(0, 0, 1);
        showToast('Erreur: ' + json.error, 'error');
      }

    } else if (mode === 'multi') {
      const tokens = document.getElementById('tokens-input').value
        .split('\n').map(t => t.trim()).filter(Boolean);
      if (!tokens.length) { showToast('Au moins un token requis', 'error'); return; }

      log(`Multicast → ${tokens.length} token(s)`, 'pending');
      updateStats(tokens.length, 0, 0);

      const res  = await fetch(`${serverUrl}/send-multicast`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tokens, title, body, data }),
      });
      const json = await res.json();

      if (json.success) {
        log(`✅ Multicast — ${json.successCount} succès / ${json.failureCount} échecs`, 'success');
        updateStats(0, json.successCount, json.failureCount);
        showToast(`${json.successCount} envoyés, ${json.failureCount} échecs`, json.failureCount ? 'info' : 'success');
      } else {
        log(`❌ Erreur multicast: ${json.error}`, 'error');
        updateStats(0, 0, tokens.length);
        showToast('Erreur: ' + json.error, 'error');
      }

    } else if (mode === 'topic') {
      showToast('Mode topic : implémentez /send-topic dans server.js', 'info');
      log('ℹ️ Mode topic — ajoutez la route /send-topic dans server.js', 'info');
    }

  } catch (e) {
    log(`❌ Erreur réseau: ${e.message} — vérifiez que node server.js est démarré`, 'error');
    updateStats(0, 0, 1);
    showToast('Erreur réseau — serveur accessible ?', 'error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = '🚀 ENVOYER LA NOTIFICATION';
  }
}
</script>
</body>
</html>
