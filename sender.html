<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OneSignal — Expéditeur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090f;
      --surface: #0f1117;
      --surface2: #161b27;
      --border: #1e2535;
      --accent: #f97316;
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #10b981;
      --error: #ef4444;
      --radius: 14px;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 48px 20px;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(249,115,22,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 10% 90%, rgba(251,146,60,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    .container { position: relative; z-index: 1; width: 100%; max-width: 520px; }

    header { display: flex; align-items: center; gap: 14px; margin-bottom: 40px; }

    .logo-ring {
      width: 46px; height: 46px; border-radius: 50%;
      border: 2px solid var(--accent); display: grid; place-items: center;
      box-shadow: 0 0 22px rgba(249,115,22,0.25);
    }
    .logo-ring svg { width: 20px; height: 20px; fill: var(--accent); }

    header h1 { font-size: 1.55rem; font-weight: 800; letter-spacing: -0.02em; }
    header h1 span { color: var(--accent); }

    .btn-back {
      margin-left: auto;
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Space Mono', monospace; font-size: 0.65rem;
      text-decoration: none; color: #64748b;
      border: 1px solid var(--border); background: transparent;
      padding: 6px 14px; border-radius: 20px; transition: all 0.2s;
    }
    .btn-back:hover { color: var(--text); border-color: #475569; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 28px 24px;
    }

    .field { margin-bottom: 20px; }
    .field:last-child { margin-bottom: 0; }

    label { display: block; font-size: 0.75rem; font-weight: 700; color: #94a3b8; margin-bottom: 8px; }

    input, textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif;
      font-size: 0.9rem; padding: 12px 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,115,22,0.1); }

    #player-id {
      font-family: 'Space Mono', monospace; font-size: 0.72rem;
      min-height: 72px; color: #94a3b8;
    }

    .divider { height: 1px; background: var(--border); margin: 24px 0; }

    .btn-send {
      width: 100%; margin-top: 24px; padding: 15px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px; font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 800; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
      position: relative; overflow: hidden;
    }
    .btn-send::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: translateX(-100%); transition: transform 0.5s;
    }
    .btn-send:hover::before { transform: translateX(100%); }
    .btn-send:hover { background: #ea6c0a; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(249,115,22,0.3); }
    .btn-send:active { transform: translateY(0); }
    .btn-send:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      margin-top: 14px; border-radius: 8px; padding: 13px 16px;
      font-family: 'Space Mono', monospace; font-size: 0.73rem; line-height: 1.6;
      display: none; border: 1px solid transparent;
    }
    .result.success { display: block; background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.25); color: var(--success); }
    .result.error   { display: block; background: rgba(239,68,68,0.08);  border-color: rgba(239,68,68,0.25);  color: var(--error); }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-ring">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </div>
    <h1>One<span>Signal</span></h1>
    <a href="receiver.html" class="btn-back">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Récepteur
    </a>
  </header>

  <div class="card">
    <div class="field">
      <label>Player ID du destinataire</label>
      <textarea id="player-id" placeholder="Collez ici le Player ID copié depuis la page Récepteur…"></textarea>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label>Titre</label>
      <input type="text" id="title" value="🔔 Nouvelle notification" placeholder="Titre…"/>
    </div>

    <div class="field">
      <label>Message</label>
      <textarea id="body" placeholder="Texte du message…">Ceci est un message test envoyé via OneSignal.</textarea>
    </div>
  </div>

  <button class="btn-send" id="btn-send" onclick="send()">
    <span class="spinner" id="spinner"></span>
    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" id="icon"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    Envoyer
  </button>

  <div class="result" id="result"></div>

</div>
<script>
  // ← Remplacez par vos clés OneSignal
  const APP_ID   = "VOTRE_APP_ID_ONESIGNAL";
  const API_KEY  = "VOTRE_REST_API_KEY_ONESIGNAL"; // OneSignal Dashboard → Settings → Keys & IDs

  async function send() {
    const playerId = document.getElementById('player-id').value.trim();
    const title    = document.getElementById('title').value.trim();
    const body     = document.getElementById('body').value.trim();

    if (!playerId) return show('error', '⚠ Collez le Player ID du destinataire.');
    if (!title || !body) return show('error', '⚠ Le titre et le message sont requis.');

    const btn     = document.getElementById('btn-send');
    const spinner = document.getElementById('spinner');
    const icon    = document.getElementById('icon');

    btn.disabled = true;
    spinner.style.display = 'block';
    icon.style.display = 'none';
    document.getElementById('result').className = 'result';

    try {
      const res = await fetch('https://onesignal.com/api/v1/notifications', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Basic ${API_KEY}`
        },
        body: JSON.stringify({
          app_id: APP_ID,
          include_player_ids: [playerId],
          headings: { en: title, fr: title },
          contents: { en: body, fr: body }
        })
      });

      const json = await res.json();

      if (res.ok && json.id) {
        show('success', `✓ Notification envoyée ! (id: ${json.id})`);
      } else {
        const err = json.errors ? json.errors.join(', ') : JSON.stringify(json);
        show('error', `✗ Erreur OneSignal : ${err}`);
      }
    } catch (err) {
      show('error', `✗ Erreur réseau : ${err.message}`);
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      icon.style.display = '';
    }
  }

  function show(type, msg) {
    const el = document.getElementById('result');
    el.className = `result ${type}`;
    el.textContent = msg;
  }
</script>
</body>
</html>
