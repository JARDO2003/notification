<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FCM — Envoi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090f;
      --surface: #0f1117;
      --surface2: #161b27;
      --border: #1e2535;
      --accent: #f97316;
      --accent2: #fb923c;
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #10b981;
      --error: #ef4444;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(249,115,22,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 10% 90%, rgba(251,146,60,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
    }

    /* Header */
    header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 40px;
    }

    .logo-ring {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: grid; place-items: center;
      box-shadow: 0 0 24px rgba(249,115,22,0.3);
    }

    .logo-ring svg { width: 22px; height: 22px; fill: var(--accent); }

    header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; }
    header span { color: var(--accent); }

    .pill {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .pill-orange { border: 1px solid rgba(249,115,22,0.4); color: var(--accent); background: rgba(249,115,22,0.05); }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
    }

    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Form elements */
    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 7px;
      letter-spacing: 0.02em;
    }

    input, textarea, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      resize: vertical;
      min-height: 80px;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
    }

    input::placeholder, textarea::placeholder { color: var(--muted); }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* Toggle Tabs */
    .tab-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: rgba(249,115,22,0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Send button */
    .btn-send {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn-send::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .btn-send:hover::before { transform: translateX(100%); }
    .btn-send:hover { background: #ea6c0a; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(249,115,22,0.3); }
    .btn-send:active { transform: translateY(0); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Result area */
    .result-box {
      margin-top: 16px;
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      line-height: 1.6;
      display: none;
      border: 1px solid transparent;
    }

    .result-box.success {
      display: block;
      background: rgba(16,185,129,0.08);
      border-color: rgba(16,185,129,0.25);
      color: var(--success);
    }

    .result-box.error {
      display: block;
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.25);
      color: var(--error);
    }

    /* History */
    #history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hist-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      animation: fade-up 0.3s ease both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hist-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }

    .hist-dot.fail { background: var(--error); }

    .hist-info { flex: 1; min-width: 0; }

    .hist-title {
      font-size: 0.82rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .hist-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem; color: var(--muted);
      margin-top: 2px;
    }

    .hist-time {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; color: var(--muted);
      white-space: nowrap;
    }

    .empty-hist {
      text-align: center; padding: 28px;
      color: var(--muted); font-size: 0.82rem;
    }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-ring">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </div>
    <h1>FCM <span>Expéditeur</span></h1>
    <div class="pill pill-orange">API v1</div>
  </header>

  <!-- Server Key -->
  <div class="card">
    <div class="section-title">// Authentification Firebase</div>

    <div class="field">
      <label>Clé serveur Firebase (Legacy) ou Access Token (v1)</label>
      <input type="password" id="server-key" placeholder="Collez votre Server Key ou Bearer token ici…"/>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" id="tab-legacy" onclick="switchMode('legacy')">Legacy HTTP API</button>
      <button class="tab-btn" id="tab-v1" onclick="switchMode('v1')">FCM v1 API</button>
    </div>
  </div>

  <!-- Destination -->
  <div class="card">
    <div class="section-title">// Destinataire</div>

    <div class="tab-row">
      <button class="tab-btn active" id="dest-token-btn" onclick="switchDest('token')">Token FCM</button>
      <button class="tab-btn" id="dest-topic-btn" onclick="switchDest('topic')">Topic</button>
    </div>

    <div id="dest-token-field" class="field">
      <label>Token FCM du destinataire</label>
      <textarea id="dest-token" rows="3" placeholder="Collez ici le token copié depuis la page Récepteur…"></textarea>
    </div>

    <div id="dest-topic-field" class="field" style="display:none">
      <label>Nom du Topic</label>
      <input type="text" id="dest-topic" placeholder="ex: news, alerts, all"/>
    </div>
  </div>

  <!-- Notification -->
  <div class="card">
    <div class="section-title">// Contenu de la notification</div>

    <div class="field">
      <label>Titre *</label>
      <input type="text" id="notif-title" placeholder="Titre de la notification" value="🔔 Nouvelle notification"/>
    </div>

    <div class="field">
      <label>Corps du message *</label>
      <textarea id="notif-body" rows="3" placeholder="Texte du message…">Ceci est un message test envoyé via FCM.</textarea>
    </div>

    <div class="field-row">
      <div class="field" style="margin:0">
        <label>URL de l'icône (optionnel)</label>
        <input type="text" id="notif-icon" placeholder="https://…/icon.png"/>
      </div>
      <div class="field" style="margin:0">
        <label>URL de clic (optionnel)</label>
        <input type="text" id="notif-click" placeholder="https://…"/>
      </div>
    </div>
  </div>

  <!-- Data payload -->
  <div class="card">
    <div class="section-title">// Données supplémentaires (optionnel)</div>
    <div class="field" style="margin:0">
      <label>Payload JSON</label>
      <textarea id="notif-data" rows="4" placeholder='{"cle": "valeur", "url": "https://…"}'></textarea>
    </div>
  </div>

  <!-- Send -->
  <button class="btn-send" id="btn-send" onclick="sendNotification()">
    <span class="spinner" id="send-spinner"></span>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="send-icon"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    Envoyer la notification
  </button>

  <div class="result-box" id="result-box"></div>

  <!-- Historique -->
  <div class="card" style="margin-top:24px">
    <div class="section-title">// Historique d'envoi</div>
    <div id="history-list">
      <div class="empty-hist">Aucun envoi effectué</div>
    </div>
  </div>

</div>

<script>
  let apiMode = 'legacy';
  let destMode = 'token';
  const history = [];

  function switchMode(mode) {
    apiMode = mode;
    document.getElementById('tab-legacy').classList.toggle('active', mode === 'legacy');
    document.getElementById('tab-v1').classList.toggle('active', mode === 'v1');
    const placeholder = mode === 'legacy'
      ? 'Collez votre Server Key (legacy)…'
      : 'Collez votre Bearer access token (OAuth2)…';
    document.getElementById('server-key').placeholder = placeholder;
  }

  function switchDest(mode) {
    destMode = mode;
    document.getElementById('dest-token-btn').classList.toggle('active', mode === 'token');
    document.getElementById('dest-topic-btn').classList.toggle('active', mode === 'topic');
    document.getElementById('dest-token-field').style.display = mode === 'token' ? '' : 'none';
    document.getElementById('dest-topic-field').style.display = mode === 'topic' ? '' : 'none';
  }

  function formatTime(d) {
    return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function addHistory(title, status, detail) {
    const list = document.getElementById('history-list');
    const empties = list.querySelectorAll('.empty-hist');
    empties.forEach(e => e.remove());

    const item = document.createElement('div');
    item.className = 'hist-item';
    item.innerHTML = `
      <div class="hist-dot ${status === 'fail' ? 'fail' : ''}"></div>
      <div class="hist-info">
        <div class="hist-title">${title}</div>
        <div class="hist-sub">${detail}</div>
      </div>
      <div class="hist-time">${formatTime(new Date())}</div>
    `;
    list.insertBefore(item, list.firstChild);
  }

  function setResult(type, msg) {
    const box = document.getElementById('result-box');
    box.className = `result-box ${type}`;
    box.textContent = msg;
  }

  async function sendNotification() {
    const serverKey = document.getElementById('server-key').value.trim();
    const title     = document.getElementById('notif-title').value.trim();
    const body      = document.getElementById('notif-body').value.trim();
    const icon      = document.getElementById('notif-icon').value.trim();
    const clickUrl  = document.getElementById('notif-click').value.trim();
    const rawData   = document.getElementById('notif-data').value.trim();

    if (!serverKey) return setResult('error', '⚠ Veuillez renseigner la clé serveur ou l\'access token.');
    if (!title || !body) return setResult('error', '⚠ Le titre et le corps sont obligatoires.');

    let dest, destKey;
    if (destMode === 'token') {
      dest = document.getElementById('dest-token').value.trim();
      destKey = 'to';
    } else {
      dest = '/topics/' + document.getElementById('dest-topic').value.trim();
      destKey = 'to';
    }
    if (!dest) return setResult('error', '⚠ Veuillez indiquer un token ou un topic.');

    let extraData = {};
    if (rawData) {
      try { extraData = JSON.parse(rawData); }
      catch { return setResult('error', '⚠ Le payload JSON est invalide.'); }
    }

    if (clickUrl) extraData.click_action = clickUrl;

    const btn     = document.getElementById('btn-send');
    const spinner = document.getElementById('send-spinner');
    const icon_el = document.getElementById('send-icon');
    btn.disabled = true;
    spinner.style.display = 'block';
    icon_el.style.display = 'none';

    try {
      let url, headers, bodyPayload;

      if (apiMode === 'legacy') {
        url = 'https://fcm.googleapis.com/fcm/send';
        headers = {
          'Content-Type': 'application/json',
          'Authorization': `key=${serverKey}`
        };
        bodyPayload = {
          [destKey]: dest,
          notification: {
            title,
            body,
            ...(icon ? { icon } : {}),
            ...(clickUrl ? { click_action: clickUrl } : {})
          },
          data: Object.keys(extraData).length ? extraData : undefined
        };
      } else {
        // FCM v1
        const projectId = 'data-com-a94a8';
        url = `https://fcm.googleapis.com/v1/projects/${projectId}/messages:send`;
        headers = {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${serverKey}`
        };
        const target = destMode === 'topic'
          ? { topic: document.getElementById('dest-topic').value.trim() }
          : { token: dest };
        bodyPayload = {
          message: {
            ...target,
            notification: {
              title,
              body,
              ...(icon ? { image: icon } : {})
            },
            ...(Object.keys(extraData).length ? { data: Object.fromEntries(Object.entries(extraData).map(([k, v]) => [k, String(v)])) } : {})
          }
        };
      }

      const res = await fetch(url, {
        method: 'POST',
        headers,
        body: JSON.stringify(bodyPayload)
      });

      const json = await res.json();
      console.log('[FCM] Réponse:', json);

      if (res.ok && (json.success === 1 || json.name)) {
        setResult('success', `✓ Notification envoyée avec succès !\n\nRéponse : ${JSON.stringify(json, null, 2)}`);
        addHistory(title, 'ok', `→ ${dest.slice(0, 40)}…`);
      } else {
        const errMsg = json.error || JSON.stringify(json);
        setResult('error', `✗ Erreur Firebase : ${errMsg}\n\n${JSON.stringify(json, null, 2)}`);
        addHistory(title, 'fail', errMsg);
      }
    } catch (err) {
      setResult('error', `✗ Erreur réseau : ${err.message}\n\nVérifiez votre clé et votre connexion.`);
      addHistory(title, 'fail', err.message);
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      icon_el.style.display = '';
    }
  }
</script>
</body>
</html>
